name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies (incl. dev group)
        run: uv sync --dev

      # Network-marked tests (real NCBI / EuropePMC / Gemini calls) are deselected
      # by the `-m 'not network'` default in pyproject.toml, so CI needs no secrets.
      - name: Run tests
        run: uv run pytest
